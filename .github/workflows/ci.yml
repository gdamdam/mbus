name: CI

# Type-check, lint, test and build on every push to main and every pull request.
# `npm run check` runs typecheck + lint + test + build (the full gate). The
# mbus-client library is consumed from source (see vite.config.ts), so no
# separate library build step is needed for the app.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
